    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const getTieredInfo = (score) => {
            const s = Math.floor(score);
            if (s >= 49) return { label: "DIVINE VISIONARY", quote: "Are you a monitor? Your retinas are cheating." };
            if (s >= 48) return { label: "EYE OF THE TIGER", quote: "Pantone wants your location right now." };
            if (s >= 47) return { label: "COLOR CONNOISSEUR", quote: "You see the spectrum others only dream of." };
            if (s >= 40) return { label: "SHADE SPECIALIST", quote: "Strong grasp of the secondary layers." };
            return { label: "COLOR APPRENTICE", quote: "Not quite there yet. Try it in a darker room?" };
        };

        const hslToRgb = (h, s, l) => {
            s /= 100; l /= 100;
            const k = n => (n + h / 30) % 12;
            const a = s * Math.min(l, 1 - l);
            const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, 9 - k(n), 1));
            return [255 * f(0), 255 * f(8), 255 * f(4)];
        };

        const calculateScore = (targetHsl, guessHsl) => {
            const [r1, g1, b1] = hslToRgb(...targetHsl);
            const [r2, g2, b2] = hslToRgb(...guessHsl);
            const dist = Math.sqrt(Math.pow(r1 - r2, 2) + Math.pow(g1 - g2, 2) + Math.pow(b1 - b2, 2));
            return parseFloat((10 * Math.pow(1 - (dist / 441.67), 1.8)).toFixed(2));
        };

        const generateColor = (round) => {
            const h = Math.floor(Math.random() * 360);
            if (round === 1) return [h, 90, 50];
            if (round === 3) return [h, 20, 80];
            if (round === 5) return [h, 15, 12];
            return [h, 50, 45];
        };

        const formatMs = (ms) => {
            const s = Math.floor(ms / 1000);
            const m = Math.floor((ms % 1000) / 10);
            return `${s}.${m.toString().padStart(2, '0')}`;
        };

        function ColorGame() {
            const [round, setRound] = useState(1);
            const [stage, setStage] = useState('start');
            const [targetColor, setTargetColor] = useState([0, 0, 0]);
            const [guessColor, setGuessColor] = useState([180, 100, 50]);
            const [history, setHistory] = useState([]);
            const [msTimer, setMsTimer] = useState(5000);
            const [guessTimer, setGuessTimer] = useState(30);
            const [toast, setToast] = useState(null);
            const [resultTimer, setResultTimer] = useState(5);

            useEffect(() => {
                let id;
                if (stage === 'memorize' && msTimer > 0) {
                    id = setInterval(() => { setMsTimer(prev => Math.max(0, prev - 4)); }, 4);
                } else if (stage === 'memorize' && msTimer <= 0) {
                    setStage('guess'); setGuessTimer(30);
                }
                return () => clearInterval(id);
            }, [stage, msTimer]);

            useEffect(() => {
                let id;
                if (stage === 'guess' && guessTimer > 0) {
                    id = setInterval(() => setGuessTimer(t => t - 1), 1000);
                } else if (stage === 'guess' && guessTimer === 0) {
                    submitGuess();
                }
                return () => clearInterval(id);
            }, [stage, guessTimer]);

            // Auto-advance Logic for Result Stage
            useEffect(() => {
                let id;
                if (stage === 'result' && resultTimer > 0) {
                    id = setInterval(() => setResultTimer(t => t - 1), 1000);
                } else if (stage === 'result' && resultTimer === 0) {
                    next();
                }
                return () => clearInterval(id);
            }, [stage, resultTimer]);

            const submitGuess = () => {
                const s = calculateScore(targetColor, guessColor);
                setHistory([...history, { round, target: targetColor, guess: guessColor, score: s }]);
                setResultTimer(5); // Reset timer when entering result stage
                setStage('result');
            };

            const next = () => {
                if (round < 5) {
                    setRound(round + 1); setTargetColor(generateColor(round + 1));
                    setGuessColor([180, 100, 50]); setMsTimer(5000); setStage('memorize');
                }
